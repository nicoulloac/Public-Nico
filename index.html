<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>School Memory Game v2</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --p1: #e74c3c;
      --p2: #3498db;
      --p1-light: #fdecea;
      --p2-light: #eaf4fb;
      --radius: 14px;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      color: #fff;
    }

    /* ══════════════════════════════════════
       START SCREEN
    ══════════════════════════════════════ */
    #start-screen {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #1a1a2e, #0f3460);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 20px;
    }

    #start-screen h1 {
      font-size: 2.4rem;
      margin-bottom: 6px;
      text-align: center;
    }

    #start-screen p {
      color: rgba(255,255,255,0.65);
      margin-bottom: 36px;
      font-size: 1rem;
    }

    .player-inputs {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .player-input-box {
      background: rgba(255,255,255,0.08);
      border-radius: var(--radius);
      padding: 20px 24px;
      width: 220px;
      text-align: center;
      border: 2px solid transparent;
      transition: border-color 0.2s;
    }

    .player-input-box.p1 { border-color: var(--p1); }
    .player-input-box.p2 { border-color: var(--p2); }

    .player-input-box .picon { font-size: 2.4rem; margin-bottom: 8px; display: block; }

    .player-input-box label {
      display: block;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
      opacity: 0.75;
    }

    .player-input-box input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1.5px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 1rem;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
    }

    .player-input-box.p1 input:focus { border-color: var(--p1); }
    .player-input-box.p2 input:focus { border-color: var(--p2); }

    #btn-start {
      padding: 14px 50px;
      background: linear-gradient(135deg, #f9ca24, #f0932b);
      color: #1a1a2e;
      border: none;
      border-radius: 30px;
      font-size: 1.1rem;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(249,202,36,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
      letter-spacing: 0.5px;
    }

    #btn-start:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(249,202,36,0.5); }

    /* ══════════════════════════════════════
       SCOREBOARD
    ══════════════════════════════════════ */
    #scoreboard {
      display: flex;
      align-items: center;
      gap: 16px;
      width: 100%;
      max-width: 920px;
      margin-bottom: 14px;
    }

    .player-panel {
      flex: 1;
      background: rgba(255,255,255,0.07);
      border-radius: var(--radius);
      padding: 12px 16px;
      border: 2.5px solid transparent;
      transition: border-color 0.3s, background 0.3s;
      position: relative;
    }

    .player-panel.p1 { border-color: rgba(231,76,60,0.4); }
    .player-panel.p2 { border-color: rgba(52,152,219,0.4); }
    .player-panel.active.p1 { border-color: var(--p1); background: rgba(231,76,60,0.12); }
    .player-panel.active.p2 { border-color: var(--p2); background: rgba(52,152,219,0.12); }

    .panel-name {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .p1 .panel-name { color: #e74c3c; }
    .p2 .panel-name { color: #3498db; }

    .panel-score {
      font-size: 2rem;
      font-weight: 900;
      line-height: 1;
    }

    .panel-hints {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.6);
      margin-top: 4px;
    }

    .hint-dots {
      display: flex;
      gap: 4px;
      margin-top: 3px;
    }

    .hint-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      transition: background 0.2s;
    }

    .hint-dot.active { background: #f9ca24; }

    .turn-badge {
      display: none;
      position: absolute;
      top: -10px; right: 10px;
      background: #f9ca24;
      color: #1a1a2e;
      font-size: 0.65rem;
      font-weight: 800;
      padding: 2px 8px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .player-panel.active .turn-badge { display: block; }

    /* Center info */
    .center-info {
      text-align: center;
      flex-shrink: 0;
    }

    #timer-display {
      font-size: 1.4rem;
      font-weight: 700;
      color: rgba(255,255,255,0.85);
    }

    #pairs-display {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ══════════════════════════════════════
       ACTION BAR
    ══════════════════════════════════════ */
    #action-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .action-btn {
      padding: 9px 22px;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 700;
      transition: transform 0.15s, opacity 0.15s;
    }

    .action-btn:hover:not(:disabled) { transform: translateY(-2px); }
    .action-btn:disabled { opacity: 0.4; cursor: default; }

    #btn-hint-game { background: #f9ca24; color: #1a1a2e; }
    #btn-new-game  { background: rgba(255,255,255,0.15); color: white; border: 1.5px solid rgba(255,255,255,0.3); }

    /* Turn message */
    #turn-msg {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.6);
      padding: 6px 18px;
      border-radius: 20px;
      background: rgba(255,255,255,0.07);
    }

    /* ══════════════════════════════════════
       CARD GRID
    ══════════════════════════════════════ */
    #game-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 8px;
      width: 100%;
      max-width: 920px;
    }

    .card {
      perspective: 600px;
      aspect-ratio: 3/4;
      cursor: pointer;
    }

    .card-inner {
      position: relative;
      width: 100%; height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.4s ease;
      border-radius: 10px;
    }

    .card.flipped .card-inner,
    .card.matched .card-inner,
    .card.hint    .card-inner { transform: rotateY(180deg); }

    .card-back, .card-front {
      position: absolute;
      inset: 0;
      border-radius: 10px;
      backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    .card-back {
      background: linear-gradient(135deg, #2c3e7a, #1a2a5e);
      border: 2px solid rgba(255,255,255,0.12);
      font-size: 1.4rem;
    }

    .card-front {
      transform: rotateY(180deg);
      background: white;
      border: 2px solid #e0e0e0;
      padding: 6px 4px;
      gap: 5px;
    }

    .card-front.type-image { background: linear-gradient(145deg, #fff8f0, #ffecd2); border-color: #f8a07a; }
    .card-front.type-word  { background: linear-gradient(145deg, #f0fff4, #d4f5e2); border-color: #7ec87f; }

    .card-emoji { font-size: 2rem; line-height: 1; }
    .card-label { font-size: 0.65rem; font-weight: 800; color: #444; text-align: center; text-transform: uppercase; letter-spacing: 0.3px; }

    /* matched per player */
    .card.matched-p1 .card-front { border-color: var(--p1) !important; box-shadow: 0 0 0 2px var(--p1); }
    .card.matched-p2 .card-front { border-color: var(--p2) !important; box-shadow: 0 0 0 2px var(--p2); }
    .card.matched { cursor: default; }

    /* wrong flash */
    @keyframes wrongShake {
      0%,100% { transform: rotateY(180deg) translateX(0); }
      25%      { transform: rotateY(180deg) translateX(-4px); }
      75%      { transform: rotateY(180deg) translateX(4px); }
    }
    .card.wrong .card-inner { animation: wrongShake 0.35s ease; }

    /* ══════════════════════════════════════
       WIN MODAL
    ══════════════════════════════════════ */
    #win-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 300;
      align-items: center;
      justify-content: center;
    }

    #win-modal.show { display: flex; }

    .modal-box {
      background: linear-gradient(145deg, #1e2d5a, #0f1f42);
      border: 1.5px solid rgba(255,255,255,0.15);
      border-radius: 22px;
      padding: 40px 48px;
      text-align: center;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
      animation: popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
      max-width: 440px;
      width: 90%;
    }

    @keyframes popIn {
      from { transform: scale(0.6); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .modal-box .trophy { font-size: 4.5rem; display: block; margin-bottom: 10px; }
    .modal-box h2 { font-size: 1.8rem; margin-bottom: 6px; }
    .modal-box .winner-name { font-size: 2rem; font-weight: 900; margin-bottom: 18px; }
    .modal-box .final-scores {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 20px;
    }
    .modal-score-box { text-align: center; }
    .modal-score-box .ms-name { font-size: 0.8rem; opacity: 0.7; text-transform: uppercase; }
    .modal-score-box .ms-val  { font-size: 2.2rem; font-weight: 900; }
    .modal-score-box.p1winner .ms-val { color: var(--p1); }
    .modal-score-box.p2winner .ms-val { color: var(--p2); }

    .modal-box .modal-stat { font-size: 0.9rem; color: rgba(255,255,255,0.55); margin-bottom: 4px; }

    .modal-btns { display: flex; gap: 10px; justify-content: center; margin-top: 24px; flex-wrap: wrap; }

    .modal-btns button {
      padding: 11px 28px;
      border: none;
      border-radius: 25px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s;
    }
    .modal-btns button:hover { transform: translateY(-2px); }
    #btn-rematch  { background: linear-gradient(135deg, #f9ca24, #f0932b); color: #1a1a2e; }
    #btn-newnames { background: rgba(255,255,255,0.15); color: white; border: 1.5px solid rgba(255,255,255,0.3); }
  </style>
</head>
<body>

<!-- ══ START SCREEN ══ -->
<div id="start-screen">
  <h1>🎓 School Memory Game</h1>
  <p>Enter player names and let the battle begin!</p>

  <div class="player-inputs">
    <div class="player-input-box p1">
      <span class="picon">🔴</span>
      <label>Player 1</label>
      <input id="p1-name" type="text" placeholder="Your name..." maxlength="16" />
    </div>
    <div class="player-input-box p2">
      <span class="picon">🔵</span>
      <label>Player 2</label>
      <input id="p2-name" type="text" placeholder="Your name..." maxlength="16" />
    </div>
  </div>

  <button id="btn-start">🚀 Start Game</button>
</div>

<!-- ══ SCOREBOARD ══ -->
<div id="scoreboard" style="display:none">
  <div class="player-panel p1" id="panel-p1">
    <div class="turn-badge">▶ Turn</div>
    <div class="panel-name" id="label-p1">Player 1</div>
    <div class="panel-score" id="score-p1">0</div>
    <div class="panel-hints">Hints left</div>
    <div class="hint-dots" id="hints-p1"></div>
  </div>

  <div class="center-info">
    <div id="timer-display">0:00</div>
    <div id="pairs-display">0 / 20 pairs</div>
  </div>

  <div class="player-panel p2" id="panel-p2">
    <div class="turn-badge">▶ Turn</div>
    <div class="panel-name" id="label-p2">Player 2</div>
    <div class="panel-score" id="score-p2">0</div>
    <div class="panel-hints">Hints left</div>
    <div class="hint-dots" id="hints-p2"></div>
  </div>
</div>

<!-- ══ ACTION BAR ══ -->
<div id="action-bar" style="display:none">
  <button class="action-btn" id="btn-hint-game">💡 Use Hint</button>
  <div id="turn-msg">—</div>
  <button class="action-btn" id="btn-new-game">🔄 New Game</button>
</div>

<!-- ══ GAME GRID ══ -->
<div id="game-grid"></div>

<!-- ══ WIN MODAL ══ -->
<div id="win-modal">
  <div class="modal-box">
    <span class="trophy" id="win-trophy">🏆</span>
    <h2 id="win-title">Winner!</h2>
    <div class="winner-name" id="win-name"></div>
    <div class="final-scores">
      <div class="modal-score-box" id="ms-p1">
        <div class="ms-name" id="ms-p1-name"></div>
        <div class="ms-val" id="ms-p1-val"></div>
      </div>
      <div style="font-size:2rem;align-self:center;">vs</div>
      <div class="modal-score-box" id="ms-p2">
        <div class="ms-name" id="ms-p2-name"></div>
        <div class="ms-val" id="ms-p2-val"></div>
      </div>
    </div>
    <div class="modal-stat" id="win-moves"></div>
    <div class="modal-stat" id="win-time"></div>
    <div class="modal-btns">
      <button id="btn-rematch">🔄 Rematch!</button>
      <button id="btn-newnames">✏️ Change Names</button>
    </div>
  </div>
</div>

<script>
  /* ═══ DATA ════════════════════════════════════════════ */
  const ITEMS = [
    { id:1,  emoji:'✏️',  word:'Pencil'           },
    { id:2,  emoji:'🖊️',  word:'Pen'              },
    { id:3,  emoji:'📚',  word:'Books'            },
    { id:4,  emoji:'🎒',  word:'Backpack'         },
    { id:5,  emoji:'📏',  word:'Ruler'            },
    { id:6,  emoji:'✂️',  word:'Scissors'         },
    { id:7,  emoji:'🌍',  word:'Globe'            },
    { id:8,  emoji:'🧮',  word:'Calculator'       },
    { id:9,  emoji:'📓',  word:'Notebook'         },
    { id:10, emoji:'🖍️',  word:'Crayon'           },
    { id:11, emoji:'🔍',  word:'Magnifying Glass' },
    { id:12, emoji:'⏰',  word:'Clock'            },
    { id:13, emoji:'💻',  word:'Laptop'           },
    { id:14, emoji:'📁',  word:'Folder'           },
    { id:15, emoji:'🖌️',  word:'Paintbrush'       },
    { id:16, emoji:'🔬',  word:'Microscope'       },
    { id:17, emoji:'🗺️',  word:'Map'              },
    { id:18, emoji:'🪑',  word:'Chair'            },
    { id:19, emoji:'📌',  word:'Pushpin'          },
    { id:20, emoji:'🔔',  word:'Bell'             },
  ];

  const MAX_HINTS = 5;

  /* ═══ STATE ═══════════════════════════════════════════ */
  let players = [
    { name:'Player 1', score:0, hints:MAX_HINTS },
    { name:'Player 2', score:0, hints:MAX_HINTS },
  ];
  let currentPlayer = 0; // 0 or 1
  let cards = [];
  let flipped = [];
  let matched = 0;
  let totalMoves = 0;
  let lock = false;
  let timerInterval = null;
  let seconds = 0;
  let gameStarted = false;

  /* ═══ HELPERS ════════════════════════════════════════ */
  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function fmtTime(s) {
    return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
  }

  /* ═══ TIMER ══════════════════════════════════════════ */
  function startTimer() {
    clearInterval(timerInterval);
    seconds = 0;
    timerInterval = setInterval(() => {
      seconds++;
      document.getElementById('timer-display').textContent = fmtTime(seconds);
    }, 1000);
  }

  function stopTimer() { clearInterval(timerInterval); }

  /* ═══ UI UPDATES ═════════════════════════════════════ */
  function renderHintDots(pid) {
    const container = document.getElementById(`hints-p${pid+1}`);
    container.innerHTML = '';
    for (let i = 0; i < MAX_HINTS; i++) {
      const dot = document.createElement('div');
      dot.className = 'hint-dot' + (i < players[pid].hints ? ' active' : '');
      container.appendChild(dot);
    }
  }

  function updateScoreboard() {
    players.forEach((p, i) => {
      document.getElementById(`score-p${i+1}`).textContent = p.score;
      renderHintDots(i);
    });
    document.getElementById('pairs-display').textContent = `${matched} / 20 pairs`;
    // active panel
    document.getElementById('panel-p1').classList.toggle('active', currentPlayer === 0);
    document.getElementById('panel-p2').classList.toggle('active', currentPlayer === 1);
    // turn message
    const p = players[currentPlayer];
    document.getElementById('turn-msg').textContent = `🎯 ${p.name}'s turn`;
    // hint button
    document.getElementById('btn-hint-game').disabled = p.hints <= 0;
  }

  /* ═══ START SCREEN ═══════════════════════════════════ */
  document.getElementById('btn-start').addEventListener('click', () => {
    const n1 = document.getElementById('p1-name').value.trim() || 'Player 1';
    const n2 = document.getElementById('p2-name').value.trim() || 'Player 2';
    players[0].name = n1;
    players[1].name = n2;
    document.getElementById('label-p1').textContent = n1;
    document.getElementById('label-p2').textContent = n2;
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('scoreboard').style.display = 'flex';
    document.getElementById('action-bar').style.display = 'flex';
    startRound();
  });

  document.getElementById('p1-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('p2-name').focus();
  });
  document.getElementById('p2-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('btn-start').click();
  });

  /* ═══ GAME INIT ══════════════════════════════════════ */
  function startRound(keepNames = true) {
    document.getElementById('win-modal').classList.remove('show');
    flipped = [];
    matched = 0;
    totalMoves = 0;
    lock = false;
    gameStarted = false;
    currentPlayer = 0;

    if (keepNames) {
      players.forEach(p => { p.score = 0; p.hints = MAX_HINTS; });
    }

    stopTimer();
    document.getElementById('timer-display').textContent = '0:00';
    updateScoreboard();

    // Build 40 cards
    cards = [];
    ITEMS.forEach(item => {
      cards.push({ uid:`img-${item.id}`, itemId:item.id, type:'image', emoji:item.emoji, word:item.word });
      cards.push({ uid:`word-${item.id}`, itemId:item.id, type:'word',  emoji:item.emoji, word:item.word });
    });
    shuffle(cards);
    renderGrid();
  }

  function renderGrid() {
    const grid = document.getElementById('game-grid');
    grid.innerHTML = '';
    cards.forEach((card, idx) => {
      const el = document.createElement('div');
      el.className = 'card';
      el.dataset.idx = idx;
      el.innerHTML = `
        <div class="card-inner">
          <div class="card-back">🏫</div>
          <div class="card-front type-${card.type}">
            ${card.type === 'image'
              ? `<div class="card-emoji">${card.emoji}</div>`
              : `<div class="card-label">${card.word}</div>`
            }
          </div>
        </div>`;
      el.addEventListener('click', () => onCardClick(idx, el));
      grid.appendChild(el);
    });
  }

  /* ═══ CARD CLICK ═════════════════════════════════════ */
  function onCardClick(idx, el) {
    if (lock) return;
    if (el.classList.contains('flipped') || el.classList.contains('matched')) return;

    if (!gameStarted) { startTimer(); gameStarted = true; }

    el.classList.add('flipped');
    flipped.push({ idx, el });

    if (flipped.length === 2) {
      totalMoves++;
      lock = true;
      checkMatch();
    }
  }

  /* ═══ MATCH CHECK ════════════════════════════════════ */
  function checkMatch() {
    const [a, b] = flipped;
    const cardA = cards[a.idx];
    const cardB = cards[b.idx];
    const isMatch = cardA.itemId === cardB.itemId && cardA.type !== cardB.type;

    if (isMatch) {
      const pClass = `matched-p${currentPlayer + 1}`;
      a.el.classList.add('matched', pClass);
      b.el.classList.add('matched', pClass);
      matched++;
      players[currentPlayer].score++;
      flipped = [];
      lock = false;
      updateScoreboard();

      if (matched === 20) {
        stopTimer();
        setTimeout(showWinModal, 700);
      }
      // same player goes again (no switch)

    } else {
      // Wrong — shake animation
      setTimeout(() => {
        a.el.classList.add('wrong');
        b.el.classList.add('wrong');
      }, 300);

      setTimeout(() => {
        a.el.classList.remove('flipped','wrong');
        b.el.classList.remove('flipped','wrong');
        flipped = [];
        // Switch player
        currentPlayer = currentPlayer === 0 ? 1 : 0;
        lock = false;
        updateScoreboard();
      }, 950);
    }
  }

  /* ═══ HINT ════════════════════════════════════════════ */
  document.getElementById('btn-hint-game').addEventListener('click', () => {
    const p = players[currentPlayer];
    if (p.hints <= 0 || lock) return;

    // Find unmatched pair
    const allCardEls = document.querySelectorAll('.card');
    const unmatchedIds = ITEMS
      .map(item => item.id)
      .filter(id => !Array.from(allCardEls).some(el => {
        const idx = el.dataset.idx;
        return cards[idx].itemId === id && el.classList.contains('matched');
      }));

    if (!unmatchedIds.length) return;
    const pickId = unmatchedIds[Math.floor(Math.random() * unmatchedIds.length)];

    p.hints--;
    updateScoreboard();

    // Flash the pair
    allCardEls.forEach(el => {
      const idx = el.dataset.idx;
      if (cards[idx].itemId === pickId && !el.classList.contains('matched')) {
        el.classList.add('hint');
        setTimeout(() => el.classList.remove('hint'), 1100);
      }
    });
  });

  /* ═══ WIN MODAL ══════════════════════════════════════ */
  function showWinModal() {
    const [p0, p1] = players;
    const tie = p0.score === p1.score;
    const winnerIdx = p0.score > p1.score ? 0 : 1;
    const winner = players[winnerIdx];

    document.getElementById('win-trophy').textContent = tie ? '🤝' : '🏆';
    document.getElementById('win-title').textContent   = tie ? "It's a Tie!" : 'Winner!';
    document.getElementById('win-name').textContent    = tie ? `${p0.name} & ${p1.name}` : winner.name;
    document.getElementById('win-name').style.color    = tie ? '#f9ca24' : (winnerIdx === 0 ? 'var(--p1)' : 'var(--p2)');

    document.getElementById('ms-p1-name').textContent = p0.name;
    document.getElementById('ms-p1-val').textContent  = p0.score;
    document.getElementById('ms-p2-name').textContent = p1.name;
    document.getElementById('ms-p2-val').textContent  = p1.score;

    document.getElementById('ms-p1').className = 'modal-score-box' + (!tie && winnerIdx === 0 ? ' p1winner' : '');
    document.getElementById('ms-p2').className = 'modal-score-box' + (!tie && winnerIdx === 1 ? ' p2winner' : '');

    document.getElementById('win-moves').textContent = `Total moves: ${totalMoves}`;
    document.getElementById('win-time').textContent  = `Time: ${fmtTime(seconds)}`;

    document.getElementById('win-modal').classList.add('show');
  }

  /* ═══ MODAL BUTTONS ══════════════════════════════════ */
  document.getElementById('btn-rematch').addEventListener('click', () => startRound(true));

  document.getElementById('btn-newnames').addEventListener('click', () => {
    document.getElementById('win-modal').classList.remove('show');
    document.getElementById('start-screen').style.display = 'flex';
    document.getElementById('scoreboard').style.display = 'none';
    document.getElementById('action-bar').style.display = 'none';
    document.getElementById('game-grid').innerHTML = '';
  });

  document.getElementById('btn-new-game').addEventListener('click', () => startRound(true));
</script>
</body>
</html>
